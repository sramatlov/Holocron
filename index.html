<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Holocron - Star Wars Rewatch Tracker</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e0241c">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#ffe81f;--gold-dim:#c9b400;
  --sith:#e0241c;--sith-deep:#b4211c;--sith-glow:#ff3b30;
  --bronze:#c9a44c;--bronze-dim:#8a7035;
  --void:#08060a;--void2:#120a0c;--panel:#180e11;--line:#3a2024;
  --txt:#e6dadb;--dim:#8a6b6e;
  --blue:#4ec3e0;--green:#3ec26d;--red:#c0372f;
  --imdb:#f5c518;--rtf:#3ec26d;--rtr:#f07060;--aud:#b08a8c;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--void);min-height:100%}
body{font-family:'Barlow',sans-serif;color:var(--txt)}
#app{min-height:100vh;padding-bottom:60px;position:relative;background:radial-gradient(ellipse 90% 60% at 50% -5%,rgba(224,36,28,.10),transparent 55%),radial-gradient(ellipse 70% 40% at 50% 105%,rgba(180,33,28,.08),transparent 60%)}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0}
.star{position:absolute;border-radius:50%;background:var(--ember,#ff6b52);animation:tw var(--d) ease-in-out infinite}
@keyframes tw{0%,100%{opacity:.06}50%{opacity:var(--o)}}
.wrap{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:0 14px}
/* Masthead */
.masthead{text-align:center;padding:36px 0 20px}
.sith-pyramid{display:flex;justify-content:center;margin-bottom:14px}
.sith-pyramid img{width:104px;height:104px;border-radius:14px;filter:drop-shadow(0 0 20px rgba(224,36,28,.4));animation:pyrglow 4s ease-in-out infinite}
@keyframes pyrglow{0%,100%{filter:drop-shadow(0 0 14px rgba(224,36,28,.3))}50%{filter:drop-shadow(0 0 26px rgba(255,59,48,.55))}}
.masthead::after{content:'';display:block;height:1px;margin-top:24px;background:linear-gradient(90deg,transparent,rgba(201,164,76,.35),transparent)}
.eyebrow{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:.45em;text-transform:uppercase;color:var(--bronze-dim);margin-bottom:12px}
.logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(34px,11vw,64px);color:var(--sith);letter-spacing:.08em;text-shadow:0 0 40px rgba(224,36,28,.45),0 0 8px rgba(255,59,48,.6)}
.tagline{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:.35em;text-transform:uppercase;color:var(--bronze);margin-top:7px}
/* Dashboard */
.dash{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:20px 0 16px}
.dc{background:linear-gradient(140deg,var(--panel),var(--void2));border:1px solid var(--line);border-radius:10px;padding:13px 14px;position:relative;overflow:hidden}
.dc::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(201,164,76,.3),transparent)}
.dc.span2{grid-column:1 / span 2}
.dc-lab{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.2em;font-size:10px;color:var(--dim);margin-bottom:5px}
.dc-val{font-family:'Orbitron',sans-serif;font-weight:700;font-size:23px;color:var(--sith);line-height:1}
.dc-sub{font-size:12px;color:var(--dim);margin-top:4px}
.pbar{height:4px;background:rgba(255,255,255,.05);border-radius:6px;overflow:hidden;margin-top:9px}
.pbar-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--sith-deep),var(--sith-glow));box-shadow:0 0 8px rgba(255,59,48,.6);transition:width 1s ease}
/* Era legend */
.era-legend{display:flex;flex-wrap:wrap;gap:5px 10px;padding:10px 12px;background:var(--panel);border:1px solid var(--line);border-radius:8px;margin-bottom:14px}
.era-dot{display:flex;align-items:center;gap:5px;font-family:'Barlow Condensed',sans-serif;font-size:12.5px;color:var(--dim)}
.era-dot b{width:6px;height:6px;border-radius:50%;display:block;flex-shrink:0}
/* Next Up */
.nextup{border-radius:10px;padding:16px 14px;margin-bottom:14px;position:relative;overflow:hidden;border:1px solid;cursor:pointer}
.nextup::before{content:'';position:absolute;inset:0;background:linear-gradient(105deg,rgba(0,0,0,.72),transparent 65%);z-index:0}
.nui{position:relative;z-index:1;padding-right:48px}
.nu-eye{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.28em;font-size:9px;color:rgba(255,255,255,.38);margin-bottom:4px}
.nu-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:23px;color:#fff;line-height:1.15}
.nu-recap{font-size:13.5px;color:rgba(255,255,255,.5);margin-top:4px;line-height:1.4}
.nu-prog{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:rgba(255,255,255,.5);margin-top:6px;letter-spacing:.04em}
.nu-btn{display:inline-flex;align-items:center;gap:6px;margin-top:10px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:4px;padding:7px 13px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.13em;font-size:11px;color:#fff;font-weight:600}
.nu-n{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-family:'Orbitron',sans-serif;font-size:44px;font-weight:900;opacity:.07;color:#fff;z-index:1;line-height:1}
/* Controls */
.controls{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.chips{display:flex;gap:5px;flex-wrap:wrap}
.chip{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.1em;font-size:12px;background:var(--panel);border:1px solid var(--line);color:var(--dim);padding:7px 14px;border-radius:20px;cursor:pointer}
.chip.on{background:var(--sith);color:#fff;border-color:var(--sith);font-weight:700;box-shadow:0 0 12px rgba(224,36,28,.4)}
.spacer{flex:1}
.btn-reset{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.1em;font-size:10px;background:none;border:1px solid var(--line);color:var(--dim);padding:7px 12px;border-radius:5px;cursor:pointer}
/* Era dividers */
.era-hdr{display:flex;align-items:center;gap:8px;margin:20px 0 6px}
.era-hdr-line{flex:1;height:1px;background:currentColor;opacity:.12}
.era-hdr-lbl{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.22em;font-size:9px;opacity:.55}
/* List items */
.list{display:flex;flex-direction:column;gap:6px}
.item{background:linear-gradient(105deg,var(--panel),var(--void2));border:1px solid var(--line);border-radius:9px;position:relative;overflow:hidden;transition:border-color .2s,box-shadow .2s}
.item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--ec);opacity:.5;border-radius:9px 0 0 9px}
.item.done{opacity:.42}
.item.done::before{opacity:1}
.item.open{border-color:color-mix(in srgb,var(--ec) 45%,var(--line));box-shadow:0 6px 26px rgba(0,0,0,.45),0 0 0 1px color-mix(in srgb,var(--ec) 12%,transparent);margin-bottom:6px}
.item.open::before{opacity:1}
/* Row */
.row{display:flex;align-items:center;padding:13px 12px 13px 16px;cursor:pointer}
.row-num{font-family:'Orbitron',sans-serif;font-weight:700;font-size:14px;color:var(--dim);width:34px;flex-shrink:0;text-align:center}
.item.done .row-num{color:var(--ec)}
.row-body{flex:1;min-width:0;padding:0 8px}
.row-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:21px;color:var(--txt);line-height:1.15;display:flex;align-items:center;gap:6px}
.item.done .row-title{text-decoration:line-through;text-decoration-color:var(--ec)}
.caret{font-size:9px;color:var(--dim);flex-shrink:0;transition:transform .2s}
.item.open .caret{transform:rotate(90deg);color:var(--ec)}
.row-recap{font-size:14px;color:#9aa2b8;margin-top:4px;line-height:1.5}
/* Episode progress bar under recap */
.ep-prog-bar{margin-top:7px;height:3px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.ep-prog-fill{height:100%;border-radius:3px;background:var(--ec);transition:width .5s ease}
/* Meta */
.meta{margin-top:6px;display:flex;flex-direction:column;gap:4px}
.meta1{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.meta2{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.tag{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.12em;font-size:10px;padding:3px 8px;border-radius:3px;font-weight:700}
.tag.movie{background:rgba(78,195,224,.1);color:var(--blue);border:1px solid rgba(78,195,224,.22)}
.tag.show{background:rgba(62,194,109,.1);color:var(--green);border:1px solid rgba(62,194,109,.22)}
.mt{font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--dim)}
.sdot{color:var(--line);font-size:9px}
.sc{font-family:'Barlow Condensed',sans-serif;font-size:13.5px;font-weight:600;padding:4px 10px;border-radius:4px}
.sc.imdb{background:rgba(245,197,24,.1);color:var(--imdb);border:1px solid rgba(245,197,24,.18)}
.sc.rt.fresh{background:rgba(62,194,109,.1);color:var(--rtf);border:1px solid rgba(62,194,109,.2)}
.sc.rt.rotten{background:rgba(240,112,96,.1);color:var(--rtr);border:1px solid rgba(240,112,96,.18)}
.sc.aud{background:rgba(122,154,184,.1);color:var(--aud);border:1px solid rgba(122,154,184,.18)}
/* Check */
.chk{width:34px;height:34px;border-radius:50%;border:2px solid var(--line);display:grid;place-items:center;flex-shrink:0;cursor:pointer}
.item.done .chk{background:var(--ec);border-color:var(--ec);box-shadow:0 0 10px var(--ec)}
.chk svg{width:14px;height:14px;stroke:#000;stroke-width:2.8;fill:none;opacity:0}
.item.done .chk svg{opacity:1}
/* Expand panel */
.panel{max-height:0;overflow:hidden;transition:max-height .35s ease}
.item.open .panel{max-height:1200px;border-top:1px solid rgba(255,255,255,.05);background:rgba(0,0,0,.22)}
/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--line)}
.tab{flex:1;text-align:center;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.14em;font-size:13.5px;padding:12px 6px;cursor:pointer;color:var(--dim);border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.on{color:var(--ec);border-bottom-color:var(--ec)}
.pane{display:none;padding:14px 14px 18px}
.pane.on{display:block}
/* Details pane */
.specs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px;padding-bottom:13px;border-bottom:1px solid rgba(255,255,255,.05)}
.spec-l{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.16em;font-size:9px;color:var(--dim);margin-bottom:2px}
.spec-v{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;color:var(--ec)}
.synopsis{font-size:14.5px;line-height:1.7;color:rgba(212,216,232,.75)}
.chars{margin-top:11px;display:flex;flex-wrap:wrap;gap:5px}
.char{font-family:'Barlow Condensed',sans-serif;font-size:11px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);color:var(--dim);padding:3px 9px;border-radius:20px}
.box-office{margin-top:14px;padding:13px 14px;border-radius:8px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.05)}
.bo-lbl{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.16em;font-size:9px;color:var(--dim);margin-bottom:10px}
.bo-figures{display:flex;align-items:flex-end;gap:12px}
.bo-fig{flex:1}
.bo-fig-l{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.1em;font-size:9px;color:var(--dim);margin-bottom:2px}
.bo-fig-v{font-family:'Orbitron',sans-serif;font-weight:700;font-size:17px;line-height:1}
.bo-fig-v.budget{color:var(--aud)}
.bo-fig-v.gross{color:var(--green)}
.bo-fig-v.gross.streaming{color:var(--bronze);font-size:14px}
.bo-arrow{font-family:'Barlow Condensed',sans-serif;font-size:16px;color:var(--dim);padding-bottom:1px}
.bo-bar{margin-top:10px;height:6px;background:rgba(62,194,109,.18);border-radius:6px;overflow:hidden;position:relative}
.bo-bar-budget{height:100%;background:linear-gradient(90deg,#3a5066,var(--aud));border-radius:6px;width:0;transition:width .9s ease .1s}
.bo-note{margin-top:9px;font-size:11px;line-height:1.55;color:var(--dim)}
/* Reception pane */
.rec-rows{margin-bottom:14px}
.rec-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.rec-lbl{width:72px;flex-shrink:0}
.rec-lbl-name{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.1em;font-size:9px;font-weight:700}
.rec-lbl-val{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;margin-top:1px}
.rec-lbl-name.imdb,.rec-lbl-val.imdb{color:var(--imdb)}
.rec-lbl-name.crit,.rec-lbl-val.crit{color:var(--rtr)}
.rec-lbl-val.crit.fresh{color:var(--rtf)}
.rec-lbl-name.aud,.rec-lbl-val.aud{color:var(--aud)}
.rec-track{flex:1;height:6px;background:rgba(255,255,255,.05);border-radius:6px;overflow:hidden}
.rec-fill{height:100%;border-radius:6px;width:0;transition:width .9s ease .1s}
.rec-fill.imdb{background:linear-gradient(90deg,#7a5e00,var(--imdb))}
.rec-fill.crit{background:linear-gradient(90deg,#7a1800,var(--rtr))}
.rec-fill.crit.fresh{background:linear-gradient(90deg,#145a2a,var(--rtf))}
.rec-fill.aud{background:linear-gradient(90deg,#1e3040,var(--aud))}
.split{display:flex;align-items:center;gap:8px;padding:9px 11px;border-radius:6px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);margin-bottom:14px;flex-wrap:wrap}
.split-lbl{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.12em;font-size:9px;color:var(--dim);flex-shrink:0}
.split-track{flex:1;min-width:60px;height:7px;background:rgba(255,255,255,.05);border-radius:6px;position:relative;overflow:hidden}
.split-c{position:absolute;left:0;top:0;bottom:0;border-radius:6px}
.split-a{position:absolute;top:0;bottom:0;border-radius:6px;opacity:.55}
.split-tag{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;flex-shrink:0}
.con-lbl{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.16em;font-size:9px;color:var(--dim);margin-bottom:6px}
.con-text{font-size:13px;line-height:1.65;color:rgba(212,216,232,.78);font-style:italic;border-left:2px solid var(--ec);padding-left:10px;margin-bottom:13px}
.ctx{font-size:12px;line-height:1.65;color:var(--dim);padding:9px 11px;border-radius:6px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.05)}
/* Episodes pane */
.ep-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ep-header-lbl{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.18em;font-size:9px;color:var(--dim)}
.ep-header-count{font-family:'Orbitron',sans-serif;font-size:11px;color:var(--ec)}
.ep-mark-all{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.1em;font-size:10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--dim);padding:4px 10px;border-radius:4px;cursor:pointer}
.ep-mark-all:hover{border-color:var(--ec);color:var(--ec)}
.ep-list{display:flex;flex-direction:column;gap:5px}
.ep-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:6px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.04);cursor:pointer}
.ep-item.ep-done{background:rgba(255,255,255,.015);opacity:.5}
.ep-num{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;color:var(--dim);width:28px;flex-shrink:0;text-align:center}
.ep-item.ep-done .ep-num{color:var(--ec)}
.ep-title{flex:1;font-family:'Barlow Condensed',sans-serif;font-size:15.5px;font-weight:600;color:var(--txt);min-width:0}
.ep-item.ep-done .ep-title{text-decoration:line-through;text-decoration-color:var(--ec);color:var(--dim)}
.ep-chk{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--line);display:grid;place-items:center;flex-shrink:0}
.ep-item.ep-done .ep-chk{background:var(--ec);border-color:var(--ec)}
.ep-chk svg{width:10px;height:10px;stroke:#000;stroke-width:3;fill:none;opacity:0}
.ep-item.ep-done .ep-chk svg{opacity:1}
/* Completion */
.done-banner{display:none;text-align:center;margin-top:32px;padding:26px 16px;border:1px solid rgba(224,36,28,.3);border-radius:12px;background:radial-gradient(ellipse at center,rgba(224,36,28,.08),transparent 70%)}
.done-banner.show{display:block}
.done-banner h3{font-family:'Orbitron',sans-serif;color:var(--sith);letter-spacing:.1em;font-size:15px;text-shadow:0 0 20px rgba(224,36,28,.5)}
.done-banner p{margin-top:8px;font-size:13px;color:var(--dim)}
.footer{text-align:center;margin-top:44px;font-family:'Barlow Condensed',sans-serif;font-style:italic;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:rgba(201,164,76,.18)}
.loading{text-align:center;padding:80px 16px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.3em;font-size:11px;color:var(--dim)}
</style>
</head>

const app=document.getElementById('app');
let W={},EW={},O={},T={},F='all';

function stars(){
  const sf=document.createElement('div');sf.className='stars';
  const embers=['#ff6b52','#ff3b30','#e0241c','#ffae8a','#c9a44c'];
  let h='';
  for(let i=0;i<100;i++){
    const x=(Math.random()*100).toFixed(1),y=(Math.random()*100).toFixed(1);
    const s=(Math.random()*1.3+0.4).toFixed(1),d=(Math.random()*5+2).toFixed(1),o=(Math.random()*.6+.15).toFixed(2);
    const c=embers[Math.floor(Math.random()*embers.length)];
    h+=`<div class="star" style="left:${x}%;top:${y}%;width:${s}px;height:${s}px;--d:${d}s;--o:${o};--ember:${c};animation-delay:${(Math.random()*5).toFixed(1)}s"></div>`;
  }
  sf.innerHTML=h;document.body.appendChild(sf);
}

function hm(m){const h=Math.floor(m/60),mm=m%60;return h?`${h}h ${mm}m`:`${mm}m`}
function dollars(s){
  // parse "$1.027B", "$775M", "~$135M", "$167M+" into a number in millions
  const clean=s.replace(/[~+,$]/g,'').trim();
  const num=parseFloat(clean);
  if(isNaN(num))return 0;
  if(/B/i.test(clean))return num*1000;
  return num;
}
function boRatio(d){
  // returns budget as a % of gross, capped, for the bar fill (shows how much of the gross the budget represents)
  const b=dollars(d.bgt),g=dollars(d.gross);
  if(!g)return 0;
  return Math.min(100,Math.round(b/g*100));
}
function ec(era){return EM[era]||'#ffe81f'}

function isWatched(d){
  if(d.ty==='movie') return !!W[d.n];
  if(!d.ep) return !!W[d.n];
  const ep=EW[d.n]||[];
  return ep.filter(Boolean).length===d.ep.length;
}

function epWatched(n,i){
  return !!(EW[n]&&EW[n][i]);
}

function epCount(d){
  if(!d.ep) return null;
  const ep=EW[d.n]||[];
  return ep.filter(Boolean).length;
}

function streak(){
  let s=0;
  for(const d of D){if(isWatched(d))s++;else break;}
  return s;
}

function verdict(c,a){
  const df=Math.abs(c-a);
  if(df<=8)return{l:'Aligned',c:'#3ec26d'};
  if(a>c+8)return{l:'Fans love it more',c:'#4ec3e0'};
  if(df<=20)return{l:'Slightly split',c:'#e0a93a'};
  return{l:'Deeply divided',c:'#c0372f'};
}

function load(){
  try{
    const r=localStorage.getItem('sw4');
    if(r){const s=JSON.parse(r);W=s.W||{};EW=s.EW||{};}
  }catch(e){}
}

function sv(){
  try{localStorage.setItem('sw4',JSON.stringify({W,EW}));}catch(e){}
}

function exportData(){
  const data=JSON.stringify({W,EW,v:1,exported:new Date().toISOString()},null,2);
  const blob=new Blob([data],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='star-wars-progress.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importData(){
  const inp=document.createElement('input');
  inp.type='file';
  inp.accept='application/json,.json';
  inp.onchange=e=>{
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const s=JSON.parse(ev.target.result);
        W=s.W||{};EW=s.EW||{};
        sv();render();
        alert('Voortgang geladen!');
      }catch(err){
        alert('Kon het bestand niet lezen. Is het een geldig export-bestand?');
      }
    };
    reader.readAsText(file);
  };
  inp.click();
}

function togTitle(n){
  const d=D.find(x=>x.n===n);
  if(d.ty==='movie'||!d.ep){W[n]=!W[n];}
  else{
    const allDone=isWatched(d);
    EW[n]=d.ep.map(()=>!allDone);
  }
  sv();render();
}

function togEp(n,i){
  if(!EW[n])EW[n]=[];
  EW[n][i]=!EW[n][i];
  sv();render();
}

function markAllEp(n,val){
  const d=D.find(x=>x.n===n);
  EW[n]=d.ep.map(()=>val);
  sv();render();
}

function togO(n){O[n]=!O[n];if(!T[n])T[n]='det';render();raf();}
function swTab(n,t){T[n]=t;render();raf();}
function raf(){requestAnimationFrame(()=>{app.querySelectorAll('.item.open .rec-fill').forEach(b=>b.style.width=b.dataset.w+'%');app.querySelectorAll('.item.open .bo-bar-budget').forEach(b=>b.style.width=b.dataset.bw+'%');});}

function reset(){
  W={};EW={};O={};T={};F='all';
  sv();render();
}

function render(){
  const tot=D.reduce((a,d)=>a+d.rt,0);
  const dn=D.filter(d=>isWatched(d));
  const drt=dn.reduce((a,d)=>a+d.rt,0);
  const pct=Math.round(dn.length/D.length*100);
  const str=streak();
  const nx=D.find(d=>!isWatched(d));
  const vis=D.filter(d=>F==='movie'?d.ty==='movie':F==='show'?d.ty==='show':F==='todo'?!isWatched(d):true);

  // total episodes across all shows
  const totalEps=D.filter(d=>d.ep).reduce((a,d)=>a+d.ep.length,0);
  const watchedEps=D.filter(d=>d.ep).reduce((a,d)=>a+(epCount(d)||0),0);

  const legend=Object.entries(EM).map(([e,c])=>`<div class="era-dot"><b style="background:${c}"></b>${e}</div>`).join('');

  // Next Up with episode progress if show
  let nxProgHtml='';
  if(nx&&nx.ep){
    const ec2=epCount(nx)||0;
    nxProgHtml=`<div class="nu-prog">${ec2} / ${nx.ep.length} episodes watched</div>`;
  }
  const nxHtml=nx?`
    <div class="nextup" style="background:linear-gradient(105deg,${ec(nx.era)}18,${ec(nx.era)}06);border-color:${ec(nx.era)}35;" data-nx="${nx.n}">
      <div class="nui">
        <div class="nu-eye">Up next in your rewatch</div>
        <div class="nu-title">${nx.ti}</div>
        <div class="nu-recap">${nx.re}</div>
        ${nxProgHtml}
        <div class="nu-btn"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="4 12 10 18 20 6"/></svg>${nx.ep?'Open episodes':'Mark as watched'}</div>
      </div>
      <div class="nu-n">${String(nx.n).padStart(2,'00')}</div>
    </div>`:'';

  let lastE=null,li='';
  vis.forEach(d=>{
    const c=ec(d.era);
    const fresh=parseInt(d.rc)>=60;
    const tab=T[d.n]||'det';
    const vd=verdict(parseInt(d.rc),parseInt(d.ra));
    const iw=(parseFloat(d.imdb)/10*100).toFixed(0);
    const watched=isWatched(d);
    const ec2=d.ep?epCount(d):null;
    const epPct=d.ep?Math.round((ec2||0)/d.ep.length*100):0;

    if(F==='all'&&d.era!==lastE){
      lastE=d.era;
      li+=`<div class="era-hdr" style="color:${c}"><div class="era-hdr-line"></div><div class="era-hdr-lbl">${d.era}</div><div class="era-hdr-line"></div></div>`;
    }

    // Episode list HTML
    let epHtml='';
    if(d.ep){
      const allDone=d.ep.every((_,i)=>epWatched(d.n,i));
      epHtml=`
        <div class="ep-header">
          <div class="ep-header-lbl">Episodes</div>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="ep-header-count">${ec2||0} / ${d.ep.length}</div>
            <button class="ep-mark-all" data-ma="${d.n}" data-val="${allDone?'0':'1'}">${allDone?'Unmark all':'Mark all'}</button>
          </div>
        </div>
        <div class="ep-list">
          ${d.ep.map((t,i)=>`
            <div class="ep-item${epWatched(d.n,i)?' ep-done':''}" data-ep="${d.n}" data-ei="${i}">
              <div class="ep-num">E${i+1}</div>
              <div class="ep-title">${t}</div>
              <div class="ep-chk"><svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg></div>
            </div>`).join('')}
        </div>`;
    } else {
      epHtml=`<div style="font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--dim);text-align:center;padding:16px 0">This is a film &mdash; use the checkbox to mark it watched.</div>`;
    }

    li+=`
    <div class="item${watched?' done':''}${O[d.n]?' open':''}" style="--ec:${c}">
      <div class="row" data-o="${d.n}">
        <div class="row-num">${String(d.n).padStart(2,'0')}</div>
        <div class="row-body">
          <div class="row-title">${d.ti}<span class="caret">&#9658;</span></div>
          <div class="row-recap">${d.re}</div>
          ${d.ep?`<div class="ep-prog-bar"><div class="ep-prog-fill" style="width:${epPct}%"></div></div>`:''}
          <div class="meta">
            <div class="meta1">
              <span class="tag ${d.ty}">${d.ty==='movie'?'Film':'Series'}</span>
              <span class="sdot">&#183;</span><span class="mt">${d.yr}</span>
              <span class="sdot">&#183;</span><span class="mt">${d.ep?`${ec2||0}/${d.ep.length} ep`:hm(d.rt)}</span>
            </div>
            <div class="meta2">
              <span class="sc imdb">IMDb ${d.imdb}</span>
              <span class="sc rt ${fresh?'fresh':'rotten'}">${fresh?'🍅':'🦠'} RT ${d.rc}%</span>
              <span class="sc aud">Aud ${d.ra}%</span>
            </div>
          </div>
        </div>
        <div class="chk" data-c="${d.n}"><svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg></div>
      </div>
      <div class="panel">
        <div class="tabs">
          <div class="tab${tab==='det'?' on':''}" data-ts="${d.n}" data-t="det">Details</div>
          <div class="tab${tab==='ep'?' on':''}" data-ts="${d.n}" data-t="ep">Episodes</div>
          <div class="tab${tab==='rec'?' on':''}" data-ts="${d.n}" data-t="rec">Reception</div>
        </div>
        <div class="pane${tab==='det'?' on':''}">
          <div class="specs">
            <div><div class="spec-l">Released</div><div class="spec-v">${d.yr}</div></div>
            <div><div class="spec-l">Format</div><div class="spec-v">${d.pa}</div></div>
            <div><div class="spec-l">Era</div><div class="spec-v">${d.era}</div></div>
            <div><div class="spec-l">Runtime</div><div class="spec-v">${hm(d.rt)}</div></div>
          </div>
          <div class="synopsis">${d.sy}</div>
          <div class="chars">${d.ch.map(x=>`<span class="char">${x}</span>`).join('')}</div>
          <div class="box-office">
            <div class="bo-lbl">${d.strm?'Production &amp; Release':'Box Office'}</div>
            <div class="bo-figures">
              <div class="bo-fig">
                <div class="bo-fig-l">Budget</div>
                <div class="bo-fig-v budget">${d.bgt}</div>
              </div>
              <div class="bo-arrow">${d.strm?'':'&rarr;'}</div>
              <div class="bo-fig">
                <div class="bo-fig-l">${d.strm?'Format':'Worldwide Gross'}</div>
                <div class="bo-fig-v gross${d.strm?' streaming':''}">${d.strm?'📺 Streaming':d.gross}</div>
              </div>
            </div>
            ${!d.strm?`<div class="bo-bar"><div class="bo-bar-budget" data-bw="${boRatio(d)}"></div></div>`:''}
            <div class="bo-note">${d.bonote}</div>
          </div>
        </div>
        <div class="pane${tab==='ep'?' on':''}">
          ${epHtml}
        </div>
        <div class="pane${tab==='rec'?' on':''}">
          <div class="rec-rows">
            <div class="rec-row">
              <div class="rec-lbl"><div class="rec-lbl-name imdb">IMDb</div><div class="rec-lbl-val imdb">${d.imdb}/10</div></div>
              <div class="rec-track"><div class="rec-fill imdb" data-w="${iw}"></div></div>
            </div>
            <div class="rec-row">
              <div class="rec-lbl"><div class="rec-lbl-name crit">RT Critics</div><div class="rec-lbl-val crit${fresh?' fresh':''}">${fresh?'🍅':'🦠'} ${d.rc}%</div></div>
              <div class="rec-track"><div class="rec-fill crit${fresh?' fresh':''}" data-w="${d.rc}"></div></div>
            </div>
            <div class="rec-row">
              <div class="rec-lbl"><div class="rec-lbl-name aud">Audience</div><div class="rec-lbl-val aud">${d.ra}%</div></div>
              <div class="rec-track"><div class="rec-fill aud" data-w="${d.ra}"></div></div>
            </div>
          </div>
          <div class="split">
            <div class="split-lbl">Split</div>
            <div class="split-track">
              <div class="split-c" style="width:${d.rc}%;background:${fresh?'var(--rtf)':'var(--rtr)'}"></div>
              <div class="split-a" style="left:${Math.min(parseInt(d.rc),parseInt(d.ra))}%;width:${Math.abs(parseInt(d.rc)-parseInt(d.ra))}%;background:${parseInt(d.ra)>parseInt(d.rc)?'var(--blue)':'var(--gold)'}"></div>
            </div>
            <div class="split-tag" style="color:${vd.c};background:${vd.c}18;border:1px solid ${vd.c}28">${vd.l}</div>
          </div>
          <div class="con-lbl">RT Critics Consensus</div>
          <div class="con-text">"${d.co}"</div>
          <div class="ctx">${d.cx}</div>
        </div>
      </div>
    </div>`;
  });

  app.innerHTML=`
  <div class="wrap">
    <div class="masthead">
      <div class="sith-pyramid">
        <img src="icon-512.png" alt="Sith Holocron" width="104" height="104">
      </div>
      <div class="eyebrow">Star Wars &middot; Chronological Saga Order</div>
      <div class="logo">HOLOCRON</div>
      <div class="tagline">Rewatch Tracker</div>
    </div>
    <div class="dash">
      <div class="dc span2">
        <div class="dc-lab">Saga Progress</div>
        <div class="dc-val">${dn.length} <span style="font-size:13px;opacity:.3">/ ${D.length}</span></div>
        <div class="dc-sub">${pct}% complete &middot; ${watchedEps} / ${totalEps} episodes</div>
        <div class="pbar"><div class="pbar-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="dc">
        <div class="dc-lab">Watched</div>
        <div class="dc-val">${hm(drt)}</div>
        <div class="dc-sub">of ${hm(tot)}</div>
      </div>
      <div class="dc">
        <div class="dc-lab">Remaining</div>
        <div class="dc-val">${hm(tot-drt)}</div>
        <div class="dc-sub">${D.length-dn.length} titles left</div>
      </div>
      <div class="dc">
        <div class="dc-lab">Streak</div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:1px">
          <div class="dc-val">${str}</div>
          ${str>0?'<span style="font-size:18px">&#128293;</span>':''}
        </div>
        <div class="dc-sub">${str===D.length?'Saga complete!':str>0?'in a row':'Start watching'}</div>
      </div>
      <div class="dc">
        <div class="dc-lab">To Watch</div>
        <div class="dc-val">${D.length-dn.length}</div>
        <div class="dc-sub">${D.filter(d=>!isWatched(d)&&d.ty==='movie').length} films &middot; ${D.filter(d=>!isWatched(d)&&d.ty==='show').length} series</div>
      </div>
    </div>
    <div class="era-legend">${legend}</div>
    ${nxHtml}
    <div class="controls">
      <div class="chips">
        ${['all','movie','show','todo'].map(f=>`<button class="chip${F===f?' on':''}" data-f="${f}">${f==='all'?'All':f==='movie'?'Films':f==='show'?'Series':'To Watch'}</button>`).join('')}
      </div>
      <div class="spacer"></div>
      <button class="btn-reset" id="exp">Export</button>
      <button class="btn-reset" id="imp">Import</button>
      <button class="btn-reset" id="rb">Reset</button>
    </div>
    <div class="list">${li}</div>
    <div class="done-banner${dn.length===D.length?' show':''}">
      <h3>&#9733; THE SAGA IS COMPLETE &#9733;</h3>
      <p>You've journeyed across ${hm(tot)} of the galaxy far, far away. May the Force be with you, always.</p>
    </div>
    <div class="footer">A long time ago in a galaxy far, far away&hellip;</div>
  </div>`;

  raf();
  app.querySelectorAll('[data-c]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();togTitle(+el.dataset.c);}));
  app.querySelectorAll('[data-o]').forEach(el=>el.addEventListener('click',()=>togO(+el.dataset.o)));
  app.querySelectorAll('[data-ts]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();swTab(+el.dataset.ts,el.dataset.t);}));
  app.querySelectorAll('[data-ep]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();togEp(+el.dataset.ep,+el.dataset.ei);}));
  app.querySelectorAll('[data-ma]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();markAllEp(+el.dataset.ma,el.dataset.val==='1');}));
  app.querySelectorAll('[data-f]').forEach(el=>el.addEventListener('click',()=>{F=el.dataset.f;render();}));
  const nx2=app.querySelector('[data-nx]');
  if(nx2)nx2.addEventListener('click',()=>{const d=D.find(x=>x.n===+nx2.dataset.nx);if(d&&d.ep){O[d.n]=true;T[d.n]='ep';render();raf();}else{togTitle(+nx2.dataset.nx);}});
  const rb=document.getElementById('rb');
  if(rb)rb.addEventListener('click',()=>{if(confirm('Reset all progress?'))reset();});
  const exp=document.getElementById('exp');
  if(exp)exp.addEventListener('click',exportData);
  const imp=document.getElementById('imp');
  if(imp)imp.addEventListener('click',importData);
}

(function(){
  stars();
  app.innerHTML='<div class="loading">Unlocking the Sith Holocron&hellip;</div>';
  load();
  render();
})();
</script>
</body>
</html>
